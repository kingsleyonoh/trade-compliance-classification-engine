services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trade
      POSTGRES_PASSWORD: trade
      POSTGRES_DB: trade_compliance
    ports:
      - "5432:5432"
    volumes:
      - trade_compliance_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade -d trade_compliance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trade_compliance_pg:
