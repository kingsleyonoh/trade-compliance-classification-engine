services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trade_compliance
      POSTGRES_USER: trade_compliance
      POSTGRES_PASSWORD: trade_compliance
    ports:
      - "55433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_compliance -d trade_compliance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
